<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TSG - Envío Exitoso</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .success-card {
            text-align: center;
            padding: 40px 20px;
        }
        .icon-check {
            font-size: 60px;
            color: #28a745;
            margin-bottom: 20px;
        }
        .btn-back {
            display: inline-block;
            margin-top: 30px;
            background-color: #000;
            color: #fff;
            text-decoration: none;
            padding: 12px 25px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <img src="ImagenesForm/LogoTSG.png" alt="TSG Logo" class="logo">
        </header>

        <div class="success-card">
            <div class="icon-check">✔</div>
            <h2>¡Reporte Enviado!</h2>
            <p>El viaje se ha entregado con éxito.</p>
            <p>La información y las fotos han sido registradas en el sistema de TSG SAS.</p>
            
            <a href="index.html" class="btn-back">Enviar otro reporte</a>
        </div>
    </div>
</body>
</html>
